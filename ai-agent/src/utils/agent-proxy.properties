# Agent Proxy Lambda Deployment Configuration
# 
# This file contains environment variables for deploying the agent_proxy.py Lambda function.
# Copy this file and customize the values for your environment.
#
# Usage:
#   1. Update the values below for your deployment
#   2. Run: ./deploy-proxy.sh
#   The script will automatically source this properties file if it exists.

# AWS Region where the Lambda function is deployed
# Set this to your target AWS region (e.g., us-east-1, us-west-2, eu-west-1)
REGION=${AWS_REGION:-us-west-2}

# Name of the Lambda function
LAMBDA_NAME=agentcore-proxy-strands-sonnet45-west2

# ARN of the AgentCore runtime (order_agent.py)
# This is REQUIRED - the script will fail if not set
# Format: arn:aws:bedrock-agentcore:REGION:ACCOUNT_ID:runtime/RUNTIME_ID
# The REGION placeholder will be replaced with the actual region from REGION variable
AGENT_RUNTIME_ARN=arn:aws:bedrock-agentcore:${AWS_REGION:-us-west-2}:YOUR_ACCOUNT_ID:runtime/YOUR_RUNTIME_ID

# CORS allowed origin for API Gateway responses
# Use "*" for all origins or specify a specific domain like "https://example.com"
ALLOW_ORIGIN=*

# Logging level for the Lambda function
# Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
LOG_LEVEL=DEBUG
