# Order Agent Deployment Configuration
# This file contains all configuration parameters for deploying the order agent to AgentCore Runtime

# Agent Configuration
AGENT_NAME=order-agent
# Set this to your target AWS region (e.g., us-east-1, us-west-2, eu-west-1)
REGION=${AWS_REGION:-us-west-2}
AGENT_RUNTIME_ID=YOUR_RUNTIME_ID

# AWS Resources
# Format: arn:aws:iam::ACCOUNT_ID:role/ROLE_NAME
RUNTIME_ROLE_ARN=arn:aws:iam::YOUR_ACCOUNT_ID:role/AmazonBedrockAgentCoreSDKRuntime-REGION-SUFFIX
S3_BUCKET=YOUR_S3_BUCKET_NAME

# Runtime Configuration
PYTHON_VERSION=PYTHON_3_12
GATEWAY_SECRET_NAME=agentcore/gateway-authcode
MODEL_ID=us.anthropic.claude-sonnet-4-5-20250929-v1:0

# Feature Flags
ENABLE_OTEL=true

# OAuth Configuration
# Format: https://YOUR_API_ID.execute-api.REGION.amazonaws.com
# The REGION placeholder will be replaced with the actual region from REGION variable
OAUTH_CALLBACK_SERVER_URL=https://YOUR_API_GATEWAY_ID.execute-api.${AWS_REGION:-us-west-2}.amazonaws.com
# Logging Configuration
LOG_LEVEL=DEBUG
