<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AgentCore Test Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Order Management Agent <span class="version-badge">v1.2.0</span></h1>
        </div>
        <div class="header-right">
          <button class="reset-session-btn" id="force-reauth" onclick="forceReauth()" title="Force re-authorization for Gateway 3LO">🔐 Force Reauth</button>
          <button class="reset-session-btn" id="reset-session" onclick="resetSession()" title="Reset runtime session">⟳ New Session</button>
          <span class="status" id="status">Disconnected</span>
          <div class="auth-section">
            <span id="user-info" style="display: none;"></span>
            <button id="signin" onclick="signIn()" style="display: none;">
              Sign in
            </button>
            <button id="signout" onclick="signOut()" style="display: none;">
              Sign out
            </button>
          </div>
        </div>
      </header>
      
      <!-- Login prompt message (shown when not logged in) -->
      <div class="login-prompt" id="login-prompt" style="display: none;">
        <p>Please sign in to continue.</p>
      </div>
      
      <section class="chat" id="chat"></section>

      <form class="composer" id="composer">
        <input
          id="prompt"
          name="prompt"
          type="text"
          placeholder="Ask something..."
          autocomplete="off"
          required
        />
        <button type="submit">Send</button>
      </form>

    </main>
    <!-- Load MSAL first, BEFORE your scripts -->
    <script src="https://unpkg.com/@azure/msal-browser@latest/lib/msal-browser.min.js"></script>
    <!-- Load markdown parsing libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked@11.0.0/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.0/dist/purify.min.js"></script>
    <!-- Load generated configuration before other scripts -->
    <script src="config.generated.js"></script>
    <script src="configAccessor.js"></script>
    <script src="config.js"></script>
    <script src="authConfig.js"></script>
    <script src="auth.js"></script>
    <script src="app.js"></script>
  </body>
</html>
