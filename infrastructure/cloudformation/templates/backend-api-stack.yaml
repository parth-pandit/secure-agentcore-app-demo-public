AWSTemplateFormatVersion: '2010-09-09'
Description: 'Backend API Stack - Orders API with Lambda functions, DynamoDB, API Gateway, and JWT Authorization'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Environment name for resource naming

  TableName:
    Type: String
    Default: orders-table
    Description: Name of the DynamoDB table
    MinLength: 3
    MaxLength: 255

  LambdaCodeBucket:
    Type: String
    Description: S3 bucket containing Lambda function code
    MinLength: 3

  LambdaCodeKey:
    Type: String
    Description: S3 key prefix for Lambda function code (e.g., lambda-code/)
    Default: lambda-code/

  # Azure Entra ID Configuration Parameters
  JwksUrl:
    Type: String
    Description: JWKS URL from Azure Entra ID for token validation
    MinLength: 10

  TokenIssuer:
    Type: String
    Description: Expected token issuer from Azure Entra ID
    MinLength: 10

  TokenAudience:
    Type: String
    Description: Expected token audience (Azure Application ID) for the Orders API
    MinLength: 3

  AuthorizedUsers:
    Type: String
    Description: JSON configuration of authorized users and their permissions
    Default: '{}'

  DeploymentSuffix:
    Type: String
    Default: ''
    Description: Timestamp suffix (yyyymmddHHMM) to make resource names unique across deployments

  CreateDDBTable:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
    Description: Whether to create the DDB table (false for DR region — uses Global Table replica)

  DRRegion:
    Type: String
    Default: ''
    Description: DR region for Global Table replica (leave empty to skip replica creation)

Conditions:
  ShouldCreateTable: !Equals [!Ref CreateDDBTable, 'true']
  HasDRRegion: !Not [!Equals [!Ref DRRegion, '']]
  CreateWithReplica: !And
    - !Condition ShouldCreateTable
    - !Condition HasDRRegion

Resources:
  # DynamoDB Global Table with GSIs for order management
  # Primary region creates the table + replica; DR region skips (uses replica)
  OrdersTable:
    Type: AWS::DynamoDB::GlobalTable
    Condition: ShouldCreateTable
    Properties:
      TableName: !Sub '${Environment}-${TableName}-${DeploymentSuffix}'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: order_date
          AttributeType: S
        - AttributeName: item_name
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: order_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: OrderDateIndex
          KeySchema:
            - AttributeName: order_date
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: ItemNameIndex
          KeySchema:
            - AttributeName: item_name
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Replicas:
        - Region: !Ref AWS::Region
          PointInTimeRecoverySpecification:
            PointInTimeRecoveryEnabled: true
          Tags:
            - Key: Environment
              Value: !Ref Environment
            - Key: Purpose
              Value: OrderManagement
            - Key: ManagedBy
              Value: CloudFormation
        - !If
          - HasDRRegion
          - Region: !Ref DRRegion
            PointInTimeRecoverySpecification:
              PointInTimeRecoveryEnabled: true
            Tags:
              - Key: Environment
                Value: !Ref Environment
              - Key: Purpose
                Value: OrderManagement-DR
              - Key: ManagedBy
                Value: CloudFormation
          - !Ref AWS::NoValue

  # IAM Role for Lambda Functions
  # Required Permissions: DynamoDB read/write, CloudWatch Logs
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-orders-lambda-role-${DeploymentSuffix}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !If
                    - ShouldCreateTable
                    - !GetAtt OrdersTable.Arn
                    - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${TableName}-${DeploymentSuffix}'
                  - !If
                    - ShouldCreateTable
                    - !Sub '${OrdersTable.Arn}/index/*'
                    - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${TableName}-${DeploymentSuffix}/index/*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: OrderManagement

  # Lambda Function - Get Orders
  # Retrieves orders from DynamoDB with optional filtering
  GetOrdersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-get-orders-${DeploymentSuffix}'
      Runtime: python3.9
      Handler: get_orders.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Sub '${Environment}-${TableName}-${DeploymentSuffix}'
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub '${LambdaCodeKey}get_orders.zip'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: OrderManagement

  # Lambda Function - Create Order
  # Creates new orders in DynamoDB with validation
  CreateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-create-order-${DeploymentSuffix}'
      Runtime: python3.9
      Handler: create_order.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Sub '${Environment}-${TableName}-${DeploymentSuffix}'
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub '${LambdaCodeKey}create_order.zip'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: OrderManagement

  # Lambda Function - Update Order
  # Updates existing orders in DynamoDB
  UpdateOrderFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-update-order-${DeploymentSuffix}'
      Runtime: python3.9
      Handler: update_order.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          DYNAMODB_TABLE_NAME: !Sub '${Environment}-${TableName}-${DeploymentSuffix}'
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub '${LambdaCodeKey}update_order.zip'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: OrderManagement

  # CloudWatch Log Group for Authorizer Audit Logs
  # Retains authorization decisions for security auditing
  AuthorizerAuditLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Environment}-orders-authorizer-${DeploymentSuffix}'
      RetentionInDays: 30  # Balance between audit requirements and cost
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: AuthorizationAudit

  # IAM Role for Lambda Authorizer
  # Required Permissions: CloudWatch Logs write access
  AuthorizerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-orders-authorizer-role-${DeploymentSuffix}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CloudWatchLogsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource:
                  - !GetAtt AuthorizerAuditLogGroup.Arn
                  - !Sub '${AuthorizerAuditLogGroup.Arn}:*'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Authorization

  # Lambda Authorizer Function
  # Validates JWT tokens from Azure Entra ID and enforces authorization policies
  AuthorizerFunction:
    Type: AWS::Lambda::Function
    DependsOn: AuthorizerAuditLogGroup
    Properties:
      FunctionName: !Sub '${Environment}-orders-authorizer-${DeploymentSuffix}'
      Runtime: python3.9
      Handler: authorizer.lambda_handler
      Role: !GetAtt AuthorizerExecutionRole.Arn
      Timeout: 10  # Short timeout for authorization checks
      MemorySize: 256
      Environment:
        Variables:
          JWKS_URL: !Ref JwksUrl
          TOKEN_ISSUER: !Ref TokenIssuer
          TOKEN_AUDIENCE: !Ref TokenAudience
          AUTHORIZED_USERS: !Ref AuthorizedUsers
          LOG_LEVEL: INFO
      Code:
        S3Bucket: !Ref LambdaCodeBucket
        S3Key: !Sub '${LambdaCodeKey}authorizer.zip'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Authorization

  # API Gateway REST API
  OrdersApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Environment}-orders-api-${DeploymentSuffix}'
      Description: REST API for order management with JWT authorization
      EndpointConfiguration:
        Types:
          - REGIONAL  # Regional endpoint for lower latency
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: OrderManagement

  # API Gateway Resource - /orders
  OrdersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref OrdersApi
      ParentId: !GetAtt OrdersApi.RootResourceId
      PathPart: orders

  # API Gateway Authorizer
  # Custom TOKEN authorizer using Lambda function for JWT validation
  ApiAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub '${Environment}-orders-authorizer-${DeploymentSuffix}'
      Type: TOKEN
      AuthorizerUri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${AuthorizerFunction.Arn}/invocations'
      AuthorizerCredentials: !GetAtt ApiGatewayAuthorizerRole.Arn
      AuthorizerResultTtlInSeconds: 300  # Cache authorization decisions for 5 minutes
      IdentitySource: method.request.header.Authorization
      RestApiId: !Ref OrdersApi

  # IAM Role for API Gateway to invoke Authorizer
  ApiGatewayAuthorizerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-api-gw-authorizer-role-${DeploymentSuffix}-${AWS::Region}'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeAuthorizerFunction
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt AuthorizerFunction.Arn
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: Authorization

  # GET Method - Get All Orders
  GetOrdersMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrdersApi
      ResourceId: !Ref OrdersResource
      HttpMethod: GET
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY  # Lambda proxy integration passes request/response directly
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GetOrdersFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # POST Method - Create Order
  CreateOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrdersApi
      ResourceId: !Ref OrdersResource
      HttpMethod: POST
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CreateOrderFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 201
          ResponseModels:
            application/json: Empty

  # PUT Method - Update Order
  UpdateOrderMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref OrdersApi
      ResourceId: !Ref OrdersResource
      HttpMethod: PUT
      AuthorizationType: CUSTOM
      AuthorizerId: !Ref ApiAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${UpdateOrderFunction.Arn}/invocations'
      MethodResponses:
        - StatusCode: 200
          ResponseModels:
            application/json: Empty

  # API Gateway Deployment
  # Deploys the API to the specified stage (environment)
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - GetOrdersMethod
      - CreateOrderMethod
      - UpdateOrderMethod
    Properties:
      RestApiId: !Ref OrdersApi
      StageName: !Ref Environment

  # Lambda Permissions for API Gateway
  # Allow API Gateway to invoke Lambda functions
  GetOrdersLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref GetOrdersFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrdersApi}/*/*/*'

  CreateOrderLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CreateOrderFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrdersApi}/*/*/*'

  UpdateOrderLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref UpdateOrderFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub 'arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${OrdersApi}/*/*/*'

Outputs:
  # API Gateway URL - Primary endpoint for the Orders API
  ApiUrl:
    Description: URL of the API Gateway endpoint
    Value: !Sub 'https://${OrdersApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/orders'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  # API Gateway ID - Used by Monitoring Stack for CloudWatch metrics
  ApiGatewayId:
    Description: ID of the API Gateway REST API
    Value: !Ref OrdersApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiGatewayId'

  # Authorizer Function Name - Used by Monitoring Stack for log metrics
  AuthorizerFunctionName:
    Description: Name of the Lambda Authorizer function
    Value: !Ref AuthorizerFunction
    Export:
      Name: !Sub '${AWS::StackName}-AuthorizerFunctionName'

  # DynamoDB Table Name - Used by Lambda functions and monitoring
  DynamoDBTableName:
    Description: Name of the DynamoDB orders table
    Value: !Sub '${Environment}-${TableName}-${DeploymentSuffix}'
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTableName'

  # DynamoDB Table ARN - Used for IAM policies and cross-stack references
  DynamoDBTableArn:
    Description: ARN of the DynamoDB orders table
    Value: !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Environment}-${TableName}-${DeploymentSuffix}'
    Export:
      Name: !Sub '${AWS::StackName}-DynamoDBTableArn'

  # Additional outputs for reference
  AuthorizerFunctionArn:
    Description: ARN of the Lambda Authorizer function
    Value: !GetAtt AuthorizerFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-AuthorizerFunctionArn'

  AuthorizerLogGroupName:
    Description: Name of the CloudWatch Log Group for authorizer audit logs
    Value: !Ref AuthorizerAuditLogGroup
    Export:
      Name: !Sub '${AWS::StackName}-AuthorizerLogGroup'

  GetOrdersFunctionArn:
    Description: ARN of the Get Orders Lambda function
    Value: !GetAtt GetOrdersFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-GetOrdersFunctionArn'

  CreateOrderFunctionArn:
    Description: ARN of the Create Order Lambda function
    Value: !GetAtt CreateOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-CreateOrderFunctionArn'

  UpdateOrderFunctionArn:
    Description: ARN of the Update Order Lambda function
    Value: !GetAtt UpdateOrderFunction.Arn
    Export:
      Name: !Sub '${AWS::StackName}-UpdateOrderFunctionArn'
